<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.9.0/axios.min.js"
      integrity="sha512-FPlUpimug7gt7Hn7swE8N2pHw/+oQMq/+R/hH/2hZ43VOQ+Kjh25rQzuLyPz7aUWKlRpI7wXbY6+U3oFPGjPOA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>

  <body>
    <div class="sidebar">
      <h2>ADMIN</h2>
      <ul>
        <li><a th:href="@{/admin}">Dashboard</a></li>
        <li><a th:href="@{/admin/foods}">Quản lý sản phẩm</a></li>
        <li><a th:href="@{/admin/tables}">Quản lý bàn</a></li>
        <li><a th:href="@{/admin/users}">Quản lý nhân viên</a></li>
        <li><a th:href="@{/admin/orders}">Quản lý hoá đơn</a></li>
      </ul>
    </div>

    <div class="main-content" x-data="foodManagement()">
      <!-- Alert Messages -->
      <div
        x-show="alertMessage.show"
        :class="alertMessage.type === 'success' ? 'alert alert-success' : 'alert alert-danger'"
        x-text="alertMessage.text"
        x-transition.opacity
      ></div>

      <!-- Keep SSR alerts for server-side messages -->
      <div
        th:if="${errorMessage}"
        class="alert alert-danger"
        th:text="${errorMessage}"
      ></div>
      <div
        th:if="${successMessage}"
        class="alert alert-success"
        th:text="${successMessage}"
      ></div>

      <div class="header">
        <h1>Quản Lý Món Ăn</h1>
        <div class="user-info">
          <form th:action="@{/logout}" method="post" style="display: inline">
            <button type="submit" class="btn-logout">Đăng xuất</button>
          </form>
          <span th:text="${loggedInUser}">Admin</span>
        </div>
      </div>

      <div class="card">
        <h3>Danh sách sản phẩm</h3>
        <button class="them">
          <a th:href="@{/admin/foods/add}" class="add-button"
            >Thêm sản món ăn mới</a
          >
        </button>

        <!-- Loading indicator -->
        <div x-show="loading" class="text-center" style="padding: 20px">
          <p>Đang tải dữ liệu...</p>
        </div>

        <!-- Error message -->
        <div x-show="error" class="alert alert-danger" x-text="error"></div>

        <!-- Products table -->
        <div x-show="!loading && !error">
          <table class="table">
            <thead>
              <tr>
                <th>STT</th>
                <th>Tên sản phẩm</th>
                <th>Mô tả</th>
                <th>Giá</th>
                <th>Ảnh</th>
                <th>Số lượng</th>
                <th>Danh mục</th>
                <th>Tác Vụ</th>
              </tr>
            </thead>
            <tbody>
              <template
                x-for="(product, index) in products"
                :key="product.foodID"
              >
                <tr>
                  <td x-text="index + 1"></td>
                  <td x-text="product.name"></td>
                  <td x-text="product.description"></td>
                  <td x-text="formatPrice(product.price)"></td>
                  <td>
                    <img
                      :src="product.anh"
                      alt="Food Image"
                      style="width: 50px; height: 50px; object-fit: cover"
                      onerror="this.src='/images/placeholder.png'"
                    />
                  </td>
                  <td x-text="product.quantity"></td>
                  <td x-text="product.category?.name || 'N/A'"></td>
                  <td class="action-buttons">
                    <button>
                      <a
                        :href="`/admin/foods/edit/${product.foodID}`"
                        class="edit"
                        >Sửa</a
                      >
                    </button>
                    <button>
                      <a
                        href="#"
                        class="delete"
                        @click.prevent="deleteProduct(product.foodID, product.name)"
                        >Xóa</a
                      >
                    </button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>

          <!-- Empty state -->
          <div
            x-show="products.length === 0"
            class="text-center"
            style="padding: 20px"
          >
            <p>Không có sản phẩm nào.</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      function foodManagement() {
        return {
          products: [],
          loading: true,
          error: null,
          alertMessage: {
            show: false,
            type: "",
            text: "",
          },

          async init() {
            await this.loadProducts();
          },

          async loadProducts() {
            try {
              this.loading = true;
              this.error = null;

              const response = await axios.get("/api/admin/foods");

              if (response.data.success) {
                this.products = response.data.data;
              } else {
                this.error =
                  response.data.message || "Không thể tải danh sách sản phẩm";
              }
            } catch (error) {
              console.error("Error loading products:", error);
              this.error = "Lỗi kết nối. Vui lòng thử lại sau.";
            } finally {
              this.loading = false;
            }
          },

          async deleteProduct(productId, productName) {
            if (
              !confirm(`Bạn có chắc chắn muốn xóa sản phẩm "${productName}"?`)
            ) {
              return;
            }

            try {
              const response = await axios.delete(
                `/api/admin/foods/${productId}`
              );

              if (response.data.success) {
                // Remove product from local array
                this.products = this.products.filter(
                  (p) => p.foodID !== productId
                );
                this.showAlert("success", "Xóa sản phẩm thành công!");
              } else {
                this.showAlert(
                  "error",
                  response.data.message || "Không thể xóa sản phẩm"
                );
              }
            } catch (error) {
              console.error("Error deleting product:", error);
              this.showAlert("error", "Lỗi kết nối. Vui lòng thử lại sau.");
            }
          },

          formatPrice(price) {
            return new Intl.NumberFormat("vi-VN").format(price) + " VND";
          },

          showAlert(type, text) {
            this.alertMessage = {
              show: true,
              type: type,
              text: text,
            };

            // Hide alert after 3 seconds
            setTimeout(() => {
              this.alertMessage.show = false;
            }, 3000);
          },
        };
      }
    </script>
  </body>
</html>
