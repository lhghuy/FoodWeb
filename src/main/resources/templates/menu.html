<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/index.css}" />
    <link rel="stylesheet" th:href="@{/css/menu.css}" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.9.0/axios.min.js"
      integrity="sha512-FPlUpimug7gt7Hn7swE8N2pHw/+oQMq/+R/hH/2hZ43VOQ+Kjh25rQzuLyPz7aUWKlRpI7wXbY6+U3oFPGjPOA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <title>Menu Nhà Hàng</title>
  </head>
  <body x-data="menuManager()">
    <div th:replace="fragments/header :: site-header"></div>
    <div class="service-banner"></div>

    <div x-show="error && !loading" class="alert alert-danger text-center mx-3">
      <h4>Không thể tải menu</h4>
      <p x-text="error"></p>
      <button class="btn btn-primary" @click="loadMenuData()">Thử lại</button>
    </div>

    <!-- Menu Content -->
    <div
      x-show="!loading && !error && allFoods.length > 0"
      class="menu-container"
    >
      <aside class="sidebar">
        <h3>Danh mục</h3>
        <ul>
          <button
            class="scroll-btn"
            :class="{ 'active': selectedCategory === 'all' }"
            @click="filterByCategory('all')"
            data-target="all"
          >
            Tất cả
          </button>

          <template x-for="category in categories" :key="category.categoryID">
            <li>
              <button
                class="scroll-btn"
                :class="{ 'active': selectedCategory === category.categoryID }"
                @click="filterByCategory(category.categoryID)"
                :data-target="category.name"
                x-text="category.name"
              ></button>
            </li>
          </template>
        </ul>
      </aside>

      <main class="menu-content">
        <!-- Section Tất cả món ăn -->
        <section
          class="menu-section"
          id="all"
          x-show="selectedCategory === 'all' || selectedCategory === null"
        >
          <h2>Tất cả món ăn</h2>
          <div class="menu-grid">
            <template x-for="food in allFoods" :key="food.foodID">
              <div class="menu-item" :data-cat="food.category?.categoryID">
                <img :src="food.anh" :alt="food.name" />
                <h3 x-text="food.name"></h3>
                <p>
                  Giá bán:
                  <span
                    class="price"
                    x-text="formatCurrency(food.price)"
                  ></span>
                </p>
              </div>
            </template>
          </div>
        </section>

        <!-- Dynamic Category Sections -->
        <template x-for="category in categories" :key="category.categoryID">
          <section
            class="menu-section"
            :id="category.name"
            x-show="selectedCategory === category.categoryID"
          >
            <h2 x-text="category.name"></h2>
            <div class="menu-grid">
              <template
                x-for="food in getFoodsByCategory(category.categoryID)"
                :key="food.foodID"
              >
                <div class="menu-item" :data-cat="food.category?.categoryID">
                  <img :src="food.anh" :alt="food.name" />
                  <h3 x-text="food.name"></h3>
                  <p>
                    Giá bán:
                    <span
                      class="price"
                      x-text="formatCurrency(food.price)"
                    ></span>
                  </p>
                </div>
              </template>
            </div>
          </section>
        </template>
      </main>
    </div>

    <!-- Alpine.js Menu Manager -->
    <script>
      function menuManager() {
        return {
          allFoods: [],
          categories: [],
          selectedCategory: "all",
          loading: true,
          error: null,

          async init() {
            await this.loadMenuData();
          },

          async loadMenuData() {
            try {
              this.loading = true;
              this.error = null;

              // Load foods and categories in parallel
              const [foodsResponse, categoriesResponse] = await Promise.all([
                axios.get("/api/client/foods"),
                axios.get("/api/client/foods/categories"),
              ]);
              this.loading = false;

              if (foodsResponse.data.success) {
                this.allFoods = foodsResponse.data.data;
              } else {
                throw new Error(
                  foodsResponse.data.message || "Không thể tải danh sách món ăn"
                );
              }

              if (categoriesResponse.data.success) {
                this.categories = categoriesResponse.data.data;
              } else {
                throw new Error(
                  categoriesResponse.data.message ||
                    "Không thể tải danh sách danh mục"
                );
              }
            } catch (error) {
              console.error("Error loading menu data:", error);
              this.error =
                error.response?.data?.message ||
                error.message ||
                "Lỗi kết nối. Vui lòng thử lại sau.";
            } finally {
              this.loading = false;
            }
          },

          filterByCategory(categoryId) {
            this.selectedCategory = categoryId;

            // Scroll to section if it exists
            let targetId = "all";
            if (categoryId !== "all") {
              const category = this.categories.find(
                (c) => c.categoryID === categoryId
              );
              if (category) {
                targetId = category.name;
              }
            }

            const targetSection = document.getElementById(targetId);
            if (targetSection) {
              targetSection.scrollIntoView({ behavior: "smooth" });
            }
          },

          getFoodsByCategory(categoryId) {
            return this.allFoods.filter(
              (food) => food.category && food.category.categoryID === categoryId
            );
          },

          formatCurrency(amount) {
            if (amount == null) return "0 VND";
            try {
              return new Intl.NumberFormat("vi-VN").format(amount) + " VND";
            } catch (error) {
              return amount + " VND";
            }
          },
        };
      }
    </script>

    <!-- Original scroll functionality for backward compatibility -->
    <script th:src="@{/js/menu.js}"></script>
    <style>
      .scroll-btn.active {
        background-color: #007bff;
        color: white;
      }

      .spinner-border {
        width: 3rem;
        height: 3rem;
      }

      .loading-container {
        min-height: 400px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </body>
</html>
