<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div th:fragment="editItemForm(tableDetail=${tableDetail})">
    <h3>Sửa số lượng</h3>
    <form th:action="@{/employee/tables/detail/{detailId}/update(detailId=${tableDetail.tableDetailId})}" method="post" id="editItemForm">
        <div class="form-group">
            <label for="quantity">Số lượng:</label>
            <input type="number" class="form-control" name="quantity" id="quantity" th:value="${tableDetail.quantity}" min="1">
        </div>
        <button type="submit" class="btn btn-primary">Cập nhật</button>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
