<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div th:fragment="addItemForm(tableId=${table.tableID}, allFoodItems=${allFoodItems}, newTableDetail=${newTableDetail})">
    <h3>Thêm món mới</h3>
    <form th:action="@{/employee/tables/{tableId}/add(tableId=${tableId})}" th:object="${newTableDetail}" method="post" id="addItemForm">
        <div class="form-group">
            <label for="foodItem">Chọn món:</label>
            <select th:field="*{foodItem.foodID}" class="form-control" id="foodItem">
                <option th:each="food : ${allFoodItems}" th:value="${food.foodID}" th:text="${food.name}"></option>
            </select>
        </div>
        <div class="form-group">
            <label for="quantity">Số lượng:</label>
            <input type="number" th:field="*{quantity}" class="form-control" id="quantity" min="1" value="1">
        </div>
        <button type="submit" class="btn btn-primary">Thêm</button>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
