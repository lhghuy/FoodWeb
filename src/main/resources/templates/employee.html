<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhan Vien</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <div class="sidebar">
        <h2>Nhan Vien</h2>
        <ul>
            <li><a th:href="@{/employee}">Dashboard</a></li>
            <li><a th:href="@{/employee/tables}">Quản lý bàn</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Dashboard</h1>
            <div class="user-info">
                <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-logout">Đăng xuất</button>
            </form>
                <span th:text="${loggedInUser}">Employee</span>
            </div>
        </div>

        <div class="card">
            <h3>Sản phẩm mới</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>Tên sản phẩm</th>
                        <th>Giá</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.name}"></td>
                        <td th:text="${#numbers.formatDecimal(product.price, 0, 'POINT', 3, 'COMMA')} + ' vnđ'"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h3>Nhân viên</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>Tên</th>
                        <th>Chức vụ</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="emp : ${employees}">
                        <td th:text="${emp.name}"></td>
                        <td th:text="${emp.role}"></td>
                        <td th:text="${emp.email}"></td>
                    </tr>
                </tbody>
            </table>
        </div>


        <div class="card">
            <h3>Thống kê doanh thu</h3>
            <div class="chart">
                <div class="bar" th:each="day : ${revenueByDay}"
                     th:style="'height:' + ${day.amount} + 'px;'">
                    <span th:text="${day.label}"></span>
                </div>
            </div>
            <div class="filter-buttons">
                <button class="active">Tuần</button>
                <button>Tháng</button>
                <button>Năm</button>
            </div>
            <p>Tổng doanh thu: <span th:text="${#numbers.formatDecimal(totalRevenue, 0, 'POINT', 3, 'COMMA')}"></span> vnđ</p>
        </div>
    </div>
</body>
</html>
