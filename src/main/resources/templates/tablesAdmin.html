<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quản lý bàn</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.9.0/axios.min.js"
      integrity="sha512-FPlUpimug7gt7Hn7swE8N2pHw/+oQMq/+R/hH/2hZ43VOQ+Kjh25rQzuLyPz7aUWKlRpI7wXbY6+U3oFPGjPOA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <style>
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1050;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        background-color: #fff;
        border-radius: 0.5rem;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        padding: 2rem;
        width: 90%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid #eee;
      }

      .modal-title {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 600;
      }

      .btn-close {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #999;
      }

      .btn-close:hover {
        color: #333;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }

      .form-control {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #ddd;
        border-radius: 0.25rem;
        font-size: 1rem;
      }

      .form-control:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
      }

      .error-message {
        color: #dc3545;
        font-size: 0.875rem;
        margin-top: 0.25rem;
      }

      .modal-footer {
        display: flex;
        gap: 0.5rem;
        justify-content: flex-end;
        margin-top: 2rem;
      }

      .btn-primary {
        background-color: #007bff;
        border-color: #007bff;
        color: white;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 0.25rem;
        cursor: pointer;
      }

      .btn-primary:hover:not(:disabled) {
        background-color: #0056b3;
      }

      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-secondary {
        background-color: #6c757d;
        border-color: #6c757d;
        color: white;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 0.25rem;
        cursor: pointer;
      }

      .btn-secondary:hover:not(:disabled) {
        background-color: #545b62;
      }

      .loading-spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .table-actions {
        display: flex;
        gap: 0.5rem;
      }

      .btn-edit,
      .btn-delete {
        padding: 0.25rem 0.5rem;
        font-size: 0.875rem;
        border-radius: 0.25rem;
        text-decoration: none;
        border: none;
        cursor: pointer;
      }

      .btn-edit {
        background-color: #28a745;
        color: white;
      }

      .btn-edit:hover {
        background-color: #218838;
        color: white;
      }

      .btn-delete {
        background-color: #dc3545;
        color: white;
      }

      .btn-delete:hover {
        background-color: #c82333;
      }

      .add-table-btn {
        background-color: #007bff;
        color: white;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 0.25rem;
        cursor: pointer;
        margin-bottom: 1rem;
        text-decoration: none;
        display: inline-block;
      }

      .add-table-btn:hover {
        background-color: #0056b3;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h2>ADMIN</h2>
      <ul>
        <li><a th:href="@{/admin}">Dashboard</a></li>
        <li><a th:href="@{/admin/foods}">Quản lý sản phẩm</a></li>
        <li><a th:href="@{/admin/tables}">Quản lý bàn</a></li>
        <li><a th:href="@{/admin/users}">Quản lý nhân viên</a></li>
        <li><a th:href="@{/admin/orders}">Quản lý hoá đơn</a></li>
      </ul>
    </div>

    <div class="main-content" x-data="tableManagement()">
      <!-- Alert Messages -->
      <div
        x-show="alertMessage.show"
        :class="alertMessage.type === 'success' ? 'alert alert-success' : 'alert alert-danger'"
        x-text="alertMessage.text"
        x-transition.opacity
      ></div>

      <div class="header">
        <h1>Quản Lý Bàn</h1>
        <div class="user-info">
          <form th:action="@{/logout}" method="post" style="display: inline">
            <button type="submit" class="btn-logout">Đăng xuất</button>
          </form>
          <span th:text="${loggedInUser}">Admin</span>
        </div>
      </div>

      <div class="card">
        <h3>Danh sách bàn</h3>

        <!-- Add Table Button -->
        <button class="add-table-btn" @click="openCreateModal()">
          <span x-show="!!!creatingTable">Thêm bàn mới</span>
          <span x-show="creatingTable">
            <div class="loading-spinner"></div>
            Đang thêm...
          </span>
        </button>

        <!-- Loading indicator -->
        <div x-show="loading" class="text-center" style="padding: 20px">
          <p>Đang tải dữ liệu...</p>
        </div>

        <!-- Error message -->
        <div x-show="error" class="alert alert-danger" x-text="error"></div>

        <!-- Tables Grid -->
        <div x-show="!loading && !error" class="table-grid-container">
          <template x-for="table in tables" :key="table.tableID">
            <div class="table-item">
              <div class="table-number" x-text="table.tableNumber"></div>
              <div
                class="status-tag"
                :class="table.status === 'Trong' ? 'status-trong' : 'status-dangphucvu'"
                x-text="table.status === 'Trong' ? 'Trống' : 'Đang phục vụ'"
              ></div>
              <div class="table-actions">
                <a :href="`/admin/tables/${table.tableID}`" class="btn-detail"
                  >Chi tiết</a
                >
                <button class="btn-edit" @click="openEditModal(table)">
                  Sửa
                </button>
                <button
                  class="btn-delete"
                  @click="deleteTable(table.tableID, table.tableNumber)"
                >
                  Xóa
                </button>
              </div>
            </div>
          </template>

          <!-- Empty state -->
          <div
            x-show="tables.length === 0"
            class="text-center"
            style="padding: 20px; grid-column: 1 / -1"
          >
            <p>Không có bàn nào.</p>
          </div>
        </div>
      </div>

      <!-- Create Table Modal -->
      <div class="modal-overlay" x-show="showCreateModal" x-transition>
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Thêm bàn mới</h5>
            <button type="button" class="btn-close" @click="closeCreateModal()">
              &times;
            </button>
          </div>
          <form @submit.prevent="createTable()">
            <div class="form-group">
              <label for="createTableNumber">Số bàn:</label>
              <input
                type="text"
                id="createTableNumber"
                x-model="createForm.tableNumber"
                class="form-control"
                required
                placeholder="Ví dụ: Bàn 01"
              />
              <div
                x-show="createForm.errors.tableNumber"
                x-text="createForm.errors.tableNumber"
                class="error-message"
              ></div>
            </div>

            <div class="form-group">
              <label for="createStatus">Trạng thái:</label>
              <select
                id="createStatus"
                x-model="createForm.status"
                class="form-control"
              >
                <option value="Trong">Trống</option>
                <option value="DangPhucVu">Đang phục vụ</option>
              </select>
            </div>

            <div class="modal-footer">
              <button
                type="submit"
                class="btn-primary"
                :disabled="submittingCreate"
              >
                <span x-show="!submittingCreate">Thêm bàn</span>
                <span x-show="submittingCreate">
                  <div class="loading-spinner"></div>
                  Đang thêm...
                </span>
              </button>
              <button
                type="button"
                class="btn-secondary"
                @click="closeCreateModal()"
                :disabled="submittingCreate"
              >
                Hủy
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Edit Table Modal -->
      <div class="modal-overlay" x-show="showEditModal" x-transition>
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Sửa thông tin bàn</h5>
            <button type="button" class="btn-close" @click="closeEditModal()">
              &times;
            </button>
          </div>
          <form @submit.prevent="updateTable()">
            <div class="form-group">
              <label for="editTableNumber">Số bàn:</label>
              <input
                type="text"
                id="editTableNumber"
                x-model="editForm.tableNumber"
                class="form-control"
                required
              />
              <div
                x-show="editForm.errors.tableNumber"
                x-text="editForm.errors.tableNumber"
                class="error-message"
              ></div>
            </div>

            <div class="form-group">
              <label for="editStatus">Trạng thái:</label>
              <select
                id="editStatus"
                x-model="editForm.status"
                class="form-control"
              >
                <option value="Trong">Trống</option>
                <option value="DangPhucVu">Đang phục vụ</option>
              </select>
            </div>

            <div class="modal-footer">
              <button
                type="submit"
                class="btn-primary"
                :disabled="submittingEdit"
              >
                <span x-show="!submittingEdit">Cập nhật</span>
                <span x-show="submittingEdit">
                  <div class="loading-spinner"></div>
                  Đang cập nhật...
                </span>
              </button>
              <button
                type="button"
                class="btn-secondary"
                @click="closeEditModal()"
                :disabled="submittingEdit"
              >
                Hủy
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      function tableManagement() {
        return {
          tables: [],
          loading: true,
          error: null,
          creatingTable: false,
          showCreateModal: false,
          showEditModal: false,
          submittingCreate: false,
          submittingEdit: false,
          alertMessage: {
            show: false,
            type: "",
            text: "",
          },
          createForm: {
            tableNumber: "",
            status: "Trong",
            errors: {},
          },
          editForm: {
            id: null,
            tableNumber: "",
            status: "Trong",
            errors: {},
          },

          async init() {
            await this.loadTables();
          },

          async loadTables() {
            try {
              this.loading = true;
              this.error = null;

              const response = await axios.get("/api/admin/tables");

              if (response.data.success) {
                this.tables = response.data.data;
              } else {
                this.error =
                  response.data.message || "Không thể tải danh sách bàn";
              }
            } catch (error) {
              console.error("Error loading tables:", error);
              this.error = "Lỗi kết nối. Vui lòng thử lại sau.";
            } finally {
              this.loading = false;
            }
          },

          openCreateModal() {
            this.createForm = {
              tableNumber: "",
              status: "Trong",
              errors: {},
            };
            this.showCreateModal = true;
          },

          closeCreateModal() {
            this.showCreateModal = false;
            this.createForm = {
              tableNumber: "",
              status: "Trong",
              errors: {},
            };
          },

          async createTable() {
            if (this.submittingCreate) return;

            try {
              this.submittingCreate = true;
              this.createForm.errors = {};

              const response = await axios.post("/api/admin/tables", {
                tableNumber: this.createForm.tableNumber,
                status: this.createForm.status,
              });

              if (response.data.success) {
                this.closeCreateModal();
                this.showAlert("success", "Thêm bàn thành công!");
                await this.loadTables();
              } else {
                this.handleApiErrors(response.data, "createForm");
              }
            } catch (error) {
              console.error("Error creating table:", error);
              if (error.response?.data?.errors) {
                this.createForm.errors = error.response.data.errors;
              }
              this.showAlert(
                "error",
                error.response?.data?.message ||
                  "Lỗi kết nối. Vui lòng thử lại sau."
              );
            } finally {
              this.submittingCreate = false;
            }
          },

          openEditModal(table) {
            this.editForm = {
              id: table.tableID,
              tableNumber: table.tableNumber,
              status: table.status,
              errors: {},
            };
            this.showEditModal = true;
          },

          closeEditModal() {
            this.showEditModal = false;
            this.editForm = {
              id: null,
              tableNumber: "",
              status: "Trong",
              errors: {},
            };
          },

          async updateTable() {
            if (this.submittingEdit) return;

            try {
              this.submittingEdit = true;
              this.editForm.errors = {};

              const response = await axios.put(
                `/api/admin/tables/${this.editForm.id}`,
                {
                  tableNumber: this.editForm.tableNumber,
                  status: this.editForm.status,
                }
              );

              if (response.data.success) {
                this.closeEditModal();
                this.showAlert("success", "Cập nhật bàn thành công!");
                await this.loadTables();
              } else {
                this.handleApiErrors(response.data, "editForm");
              }
            } catch (error) {
              console.error("Error updating table:", error);
              if (error.response?.data?.errors) {
                this.editForm.errors = error.response.data.errors;
              }
              this.showAlert(
                "error",
                error.response?.data?.message ||
                  "Lỗi kết nối. Vui lòng thử lại sau."
              );
            } finally {
              this.submittingEdit = false;
            }
          },

          async deleteTable(tableId, tableName) {
            if (!confirm(`Bạn có chắc chắn muốn xóa "${tableName}"?`)) {
              return;
            }

            try {
              const response = await axios.delete(
                `/api/admin/tables/${tableId}`
              );

              if (response.data.success) {
                this.tables = this.tables.filter((t) => t.tableID !== tableId);
                this.showAlert("success", "Xóa bàn thành công!");
              } else {
                this.showAlert(
                  "error",
                  response.data.message || "Không thể xóa bàn"
                );
              }
            } catch (error) {
              console.error("Error deleting table:", error);
              this.showAlert("error", "Lỗi kết nối. Vui lòng thử lại sau.");
            }
          },

          handleApiErrors(data, formName) {
            if (data.errors) {
              this[formName].errors = data.errors;
            }
            this.showAlert(
              "error",
              data.message || "Có lỗi xảy ra khi xử lý dữ liệu"
            );
          },

          showAlert(type, text) {
            this.alertMessage = {
              show: true,
              type: type,
              text: text,
            };

            setTimeout(() => {
              this.alertMessage.show = false;
            }, 3000);
          },
        };
      }
    </script>
  </body>
</html>
