<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý bàn</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="sidebar">
    <h2>ADMIN</h2>
    <ul>
        <li><a th:href="@{/admin}">Dashboard</a></li>
        <li><a th:href="@{/admin/foods}">Quản lý sản phẩm</a></li>
        <li><a th:href="@{/admin/tables}">Quản lý bàn</a></li>
        <li><a th:href="@{/admin/users}">Quản lý nhân viên</a></li>
        <li><a th:href="@{/admin/orders}">Quản lý hoá đơn</a></li>
    </ul>
</div>

<div class="main-content">
    <div class="header">
        <h1>Quản Lý Bàn</h1>
        <div class="user-info">
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-logout">Đăng xuất</button>
            </form>
            <span th:text="${loggedInUser}">Admin</span>
        </div>
    </div>

    <div class="card">
        <h3>Danh sách bàn</h3>
        <div class="table-grid-container">
            <div class="table-item" th:each="table : ${tables}">
                <div class="table-number" th:text="${table.tableNumber}"></div>
                <div class="status-tag" th:classappend="${table.status == 'Trong' ? 'status-trong' : 'status-dangphucvu'}" th:text="${table.status == 'Trong' ? 'Trống' : 'Đang phục vụ'}"></div>
                <div class="table-actions">
                    <a th:href="@{/admin/tables/{id}(id=${table.tableID})}" class="btn-detail">Chi tiết</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
