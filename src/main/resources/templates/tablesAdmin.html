<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quản Lý Bàn - Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.9.0/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Gắn interceptor toàn cục
      axios.interceptors.request.use(
        function (config) {
          const token = localStorage.getItem("authToken");
          if (token) {
            config.headers.Authorization = `Bearer ${token}`;
          }
          return config;
        },
        function (error) {
          return Promise.reject(error);
        }
      );
    </script>
  <style>
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1050;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-content-custom {
        background-color: #fff;
        border-radius: 12px;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        padding: 0;
        width: 90%;
        max-width: 600px;
        max-height: 90vh;
        overflow: hidden;
      }

      .modal-header-custom {
        background: linear-gradient(135deg, #2c3e50, #34495e);
        color: white;
        padding: 1.5rem 2rem;
        border-bottom: none;
        border-radius: 12px 12px 0 0;
      }

      .modal-body-custom {
        padding: 2rem;
        max-height: 70vh;
        overflow-y: auto;
      }

      .modal-footer-custom {
        padding: 1.5rem 2rem;
        border-top: 1px solid #eee;
        background-color: #f8f9fa;
        border-radius: 0 0 12px 12px;
      }

      .loading-spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .table-item {
        transition: all 0.3s ease;
        border: none;
        border-radius: 12px;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        overflow: hidden;
      }

      .table-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
      }

      .table-item .card-body {
        padding: 1.5rem;
        text-align: center;
      }

      .table-number {
        font-size: 1.5rem;
        font-weight: 700;
        color: #2c3e50;
        margin-bottom: 1rem;
      }

      .status-tag {
        padding: 0.5rem 1rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 1rem;
        display: inline-block;
      }

      .status-trong {
        background-color: rgba(39, 174, 96, 0.1);
        color: #27ae60;
        border: 1px solid rgba(39, 174, 96, 0.2);
      }

      .status-dangphucvu {
        background-color: rgba(231, 76, 60, 0.1);
        color: #e74c3c;
        border: 1px solid rgba(231, 76, 60, 0.2);
      }

      .btn-gradient-primary {
        background: linear-gradient(135deg, #667eea, #764ba2);
        border: none;
        color: white;
        transition: all 0.3s ease;
      }

      .btn-gradient-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        color: white;
      }

      .btn-gradient-success {
        background: linear-gradient(135deg, #56ab2f, #a8e6cf);
        border: none;
        color: white;
        transition: all 0.3s ease;
      }

      .btn-gradient-success:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(86, 171, 47, 0.3);
        color: white;
      }

      .btn-gradient-warning {
        background: linear-gradient(135deg, #f093fb, #f5576c);
        border: none;
        color: white;
        transition: all 0.3s ease;
      }

      .btn-gradient-warning:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(240, 147, 251, 0.3);
        color: white;
      }

      .btn-gradient-danger {
        background: linear-gradient(135deg, #ff416c, #ff4b2b);
        border: none;
        color: white;
        transition: all 0.3s ease;
      }

      .btn-gradient-danger:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(255, 65, 108, 0.3);
        color: white;
      }

      .card-modern {
        border: none;
        border-radius: 12px;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        transition: all 0.3s ease;
      }

      .alert-modern {
        border: none;
        border-radius: 8px;
        padding: 1rem 1.5rem;
        margin-bottom: 1.5rem;
      }

      .tables-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
        margin-top: 1.5rem;
      }

      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        color: #6c757d;
        grid-column: 1 / -1;
      }

      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 4rem 2rem;
        color: #6c757d;
      }

      .action-buttons-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
      }

      .table-icon {
        font-size: 2.5rem;
        color: #3498db;
        margin-bottom: 1rem;
      }

      @media (max-width: 768px) {
        .tables-grid {
          grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
          gap: 1rem;
        }

        .action-buttons-grid {
          flex-direction: column;
        }

        .action-buttons-grid .btn {
          width: 100%;
        }
      }
    </style>
  </head>

  <body class="bg-light">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-crown me-2"></i>ADMIN</h2>
      </div>
      <div class="sidebar-nav">
        <ul>
          <li>
            <a th:href="@{/admin}">
              <i class="fas fa-tachometer-alt"></i>Dashboard
            </a>
          </li>
          <li>
            <a th:href="@{/admin/foods}">
              <i class="fas fa-utensils"></i>Quản lý sản phẩm
            </a>
          </li>
          <li>
            <a th:href="@{/admin/tables}" class="active">
              <i class="fas fa-table"></i>Quản lý bàn
            </a>
          </li>
          <li>
            <a th:href="@{/admin/users}">
              <i class="fas fa-users"></i>Quản lý nhân viên
            </a>
          </li>
          <li>
            <a th:href="@{/admin/orders}">
              <i class="fas fa-receipt"></i>Quản lý hoá đơn
            </a>
          </li>
        </ul>
      </div>
    </div>

    <div class="main-content" x-data="tableManagement()">
      <div class="top-navbar">
        <h1 class="page-title"><i class="fas fa-table me-3"></i>Quản Lý Bàn</h1>
        <div class="user-actions">
          <div class="user-info">
            <span th:text="${loggedInUser}">Admin</span>
            <i class="fas fa-user-circle ms-2"></i>
          </div>
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-danger btn-sm">
              <i class="fas fa-sign-out-alt me-1"></i>Đăng xuất
            </button>
          </form>
        </div>
      </div>

      <div class="content-wrapper">
        <div
          x-show="alertMessage.show"
          :class="alertMessage.type === 'success' ? 'alert alert-success alert-modern' : 'alert alert-danger alert-modern'"
          x-text="alertMessage.text"
          x-transition.opacity
        ></div>

        <div class="main-card card-modern">
          <div class="card-header-custom">
            <h3 class="mb-0"><i class="fas fa-list me-2"></i>Danh sách bàn</h3>
            <button class="btn btn-gradient-primary" @click="openCreateModal()">
              <i class="fas fa-plus me-2"></i>Thêm bàn mới
            </button>
          </div>

          <div class="card-body">
            <div x-show="loading" class="loading-container">
              <div class="loading-spinner"></div>
              <p class="mt-3 mb-0">Đang tải dữ liệu...</p>
            </div>

            <div
              x-show="error"
              class="alert alert-danger alert-modern"
              x-text="error"
            ></div>

            <div x-show="!loading && !error">
              <div class="tables-grid">
                <template x-for="table in tables" :key="table.tableID">
                  <div class="table-item card h-100">
                    <div class="card-body">
                      <div class="table-icon">
                        <i class="fas fa-chair"></i>
                      </div>
                      <h5 class="table-number">
                        Bàn <span x-text="table.tableNumber"></span>
                      </h5>
                      <div
                        class="status-tag"
                        :class="table.status === 'Trong' ? 'status-trong' : 'status-dangphucvu'"
                        x-text="table.status === 'Trong' ? 'Trống' : 'Đang phục vụ'"
                      ></div>
                      <div class="action-buttons-grid">
                        <a
                          :href="`/admin/tables/${table.tableID}`"
                          class="btn btn-gradient-primary btn-sm"
                        >
                          <i class="fas fa-eye me-1"></i>Chi tiết
                        </a>
                        <button
                          class="btn btn-gradient-warning btn-sm"
                          @click="openEditModal(table)"
                        >
                          <i class="fas fa-edit me-1"></i>Sửa
                        </button>
                        <button
                          class="btn btn-gradient-danger btn-sm"
                          @click="deleteTable(table.tableID, table.tableNumber)"
                        >
                          <i class="fas fa-trash me-1"></i>Xóa
                        </button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>

              <div x-show="tables.length === 0" class="empty-state">
                <i class="fas fa-table fa-4x text-muted mb-3"></i>
                <h5 class="text-muted">Chưa có bàn nào</h5>
                <p class="text-muted">
                  Nhấn "Thêm bàn mới" để tạo bàn đầu tiên
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-overlay" x-show="showCreateModal" x-transition>
        <div class="modal-content-custom">
          <div class="modal-header-custom">
            <h5 class="mb-0">
              <i class="fas fa-plus-circle me-2"></i>Thêm bàn mới
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              @click="closeCreateModal()"
            ></button>
          </div>
          <form @submit.prevent="createTable()">
            <div class="modal-body-custom">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label fw-semibold">
                    <i class="fas fa-tag me-2"></i>Số bàn
                    <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    x-model="createForm.tableNumber"
                    class="form-control form-control-lg"
                    required
                    placeholder="Ví dụ: Bàn 01"
                  />
                  <div
                    x-show="createForm.errors.tableNumber"
                    x-text="createForm.errors.tableNumber"
                    class="text-danger mt-1 small"
                  ></div>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">
                    <i class="fas fa-toggle-on me-2"></i>Trạng thái
                  </label>
                  <select
                    x-model="createForm.status"
                    class="form-select form-select-lg"
                  >
                    <option value="Trong">Trống</option>
                    <option value="DangPhucVu">Đang phục vụ</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="modal-footer-custom">
              <button
                type="button"
                class="btn btn-secondary me-2"
                @click="closeCreateModal()"
                :disabled="submittingCreate"
              >
                <i class="fas fa-times me-1"></i>Hủy
              </button>
              <button
                type="submit"
                class="btn btn-gradient-primary"
                :disabled="submittingCreate"
              >
                <span x-show="!submittingCreate">
                  <i class="fas fa-save me-1"></i>Thêm bàn
                </span>
                <span x-show="submittingCreate">
                  <div class="loading-spinner me-2"></div>
                  Đang thêm...
                </span>
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="modal-overlay" x-show="showEditModal" x-transition>
        <div class="modal-content-custom">
          <div class="modal-header-custom">
            <h5 class="mb-0">
              <i class="fas fa-edit me-2"></i>Sửa thông tin bàn
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              @click="closeEditModal()"
            ></button>
          </div>
          <form @submit.prevent="updateTable()">
            <div class="modal-body-custom">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label fw-semibold">
                    <i class="fas fa-tag me-2"></i>Số bàn
                    <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    x-model="editForm.tableNumber"
                    class="form-control form-control-lg"
                    required
                  />
                  <div
                    x-show="editForm.errors.tableNumber"
                    x-text="editForm.errors.tableNumber"
                    class="text-danger mt-1 small"
                  ></div>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">
                    <i class="fas fa-toggle-on me-2"></i>Trạng thái
                  </label>
                  <select
                    x-model="editForm.status"
                    class="form-select form-select-lg"
                  >
                    <option value="Trong">Trống</option>
                    <option value="DangPhucVu">Đang phục vụ</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="modal-footer-custom">
              <button
                type="button"
                class="btn btn-secondary me-2"
                @click="closeEditModal()"
                :disabled="submittingEdit"
              >
                <i class="fas fa-times me-1"></i>Hủy
              </button>
              <button
                type="submit"
                class="btn btn-gradient-primary"
                :disabled="submittingEdit"
              >
                <span x-show="!submittingEdit">
                  <i class="fas fa-save me-1"></i>Cập nhật
                </span>
                <span x-show="submittingEdit">
                  <div class="loading-spinner me-2"></div>
                  Đang cập nhật...
                </span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      function tableManagement() {
        return {
          tables: [],
          loading: true,
          error: null,
          showCreateModal: false,
          showEditModal: false,
          submittingCreate: false,
          submittingEdit: false,
          alertMessage: { show: false, type: "", text: "" },
          createForm: { tableNumber: "", status: "Trong", errors: {} },
          editForm: { id: null, tableNumber: "", status: "Trong", errors: {} },

          async init() {
            await this.loadTables();
          },

          async loadTables() {
            try {
              this.loading = true;
              this.error = null;
              const response = await axios.get("/api/admin/tables");
              if (response.data.success) {
                this.tables = response.data.data;
              } else {
                this.error =
                  response.data.message || "Không thể tải danh sách bàn";
              }
            } catch (error) {
              console.error("Error loading tables:", error);
              this.error = "Lỗi kết nối. Vui lòng thử lại sau.";
            } finally {
              this.loading = false;
            }
          },

          openCreateModal() {
            this.createForm = { tableNumber: "", status: "Trong", errors: {} };
            this.showCreateModal = true;
          },

          closeCreateModal() {
            this.showCreateModal = false;
            this.createForm = { tableNumber: "", status: "Trong", errors: {} };
          },

          async createTable() {
            if (this.submittingCreate) return;
            try {
              this.submittingCreate = true;
              this.createForm.errors = {};
              const response = await axios.post("/api/admin/tables", {
                tableNumber: this.createForm.tableNumber,
                status: this.createForm.status,
              });
              if (response.data.success) {
                this.closeCreateModal();
                this.showAlert("success", "Thêm bàn thành công!");
                await this.loadTables();
              } else {
                this.handleApiErrors(response.data, "createForm");
              }
            } catch (error) {
              console.error("Error creating table:", error);
              if (error.response?.data?.errors) {
                this.createForm.errors = error.response.data.errors;
              }
              this.showAlert(
                "error",
                error.response?.data?.message ||
                  "Lỗi kết nối. Vui lòng thử lại sau."
              );
            } finally {
              this.submittingCreate = false;
            }
          },

          openEditModal(table) {
            this.editForm = {
              id: table.tableID,
              tableNumber: table.tableNumber,
              status: table.status,
              errors: {},
            };
            this.showEditModal = true;
          },

          closeEditModal() {
            this.showEditModal = false;
            this.editForm = {
              id: null,
              tableNumber: "",
              status: "Trong",
              errors: {},
            };
          },

          async updateTable() {
            if (this.submittingEdit) return;
            try {
              this.submittingEdit = true;
              this.editForm.errors = {};
              const response = await axios.put(
                `/api/admin/tables/${this.editForm.id}`,
                {
                  tableNumber: this.editForm.tableNumber,
                  status: this.editForm.status,
                }
              );
              if (response.data.success) {
                this.closeEditModal();
                this.showAlert("success", "Cập nhật bàn thành công!");
                await this.loadTables();
              } else {
                this.handleApiErrors(response.data, "editForm");
              }
            } catch (error) {
              console.error("Error updating table:", error);
              if (error.response?.data?.errors) {
                this.editForm.errors = error.response.data.errors;
              }
              this.showAlert(
                "error",
                error.response?.data?.message ||
                  "Lỗi kết nối. Vui lòng thử lại sau."
              );
            } finally {
              this.submittingEdit = false;
            }
          },

          async deleteTable(tableId, tableName) {
            if (!confirm(`Bạn có chắc chắn muốn xóa "${tableName}"?`)) return;
            try {
              const response = await axios.delete(
                `/api/admin/tables/${tableId}`
              );
              if (response.data.success) {
                this.tables = this.tables.filter((t) => t.tableID !== tableId);
                this.showAlert("success", "Xóa bàn thành công!");
              } else {
                this.showAlert(
                  "error",
                  response.data.message || "Không thể xóa bàn"
                );
              }
            } catch (error) {
              console.error("Error deleting table:", error);
              this.showAlert("error", "Lỗi kết nối. Vui lòng thử lại sau.");
            }
          },

          handleApiErrors(data, formName) {
            if (data.errors) {
              this[formName].errors = data.errors;
            }
            this.showAlert(
              "error",
              data.message || "Có lỗi xảy ra khi xử lý dữ liệu"
            );
          },

          showAlert(type, text) {
            this.alertMessage = { show: true, type: type, text: text };
            setTimeout(() => {
              this.alertMessage.show = false;
            }, 3000);
          },
        };
      }
    </script>
  </body>
</html>
