<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Hóa đơn thanh toán</title>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.9.0/axios.min.js"
      integrity="sha512-FPlUpimug7gt7Hn7swE8N2pHw/+oQMq/+R/hH/2hZ43VOQ+Kjh25rQzuLyPz7aUWKlRpI7wXbY6+U3oFPGjPOA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8f9fa;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .bill-container {
        max-width: 800px;
        margin: 2rem auto;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .bill-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 2rem;
        text-align: center;
      }

      .bill-header h1 {
        font-size: 2rem;
        font-weight: 700;
        margin: 0;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      }

      .bill-content {
        padding: 2rem;
      }

      .customer-info {
        background: #f8f9fa;
        border-radius: 10px;
        padding: 1.5rem;
        margin-bottom: 2rem;
        border-left: 4px solid #667eea;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
      }

      .info-row:last-child {
        margin-bottom: 0;
      }

      .info-label {
        font-weight: 600;
        color: #495057;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .info-value {
        color: #212529;
        font-weight: 500;
      }

      .items-table {
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .table th {
        background: #667eea;
        color: white;
        border: none;
        font-weight: 600;
        padding: 1rem;
      }

      .table td {
        padding: 1rem;
        vertical-align: middle;
        border-color: #e9ecef;
      }

      .item-name {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 500;
      }

      .quantity-badge {
        background: #667eea;
        color: white;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-weight: 600;
        min-width: 40px;
        text-align: center;
      }

      .price-cell {
        font-weight: 600;
        color: #28a745;
      }

      .total-row {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .total-row th,
      .total-row td {
        border: none;
        padding: 1.25rem 1rem;
        font-size: 1.125rem;
        font-weight: 700;
      }

      .action-buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 2rem;
        flex-wrap: wrap;
      }

      .btn-custom {
        padding: 0.75rem 2rem;
        font-weight: 600;
        border-radius: 25px;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        min-width: 150px;
        justify-content: center;
      }

      .btn-back {
        background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        border: none;
        color: white;
      }

      .btn-back:hover {
        background: linear-gradient(135deg, #5a6268 0%, #3d4142 100%);
        color: white;
        transform: translateY(-2px);
      }

      .btn-print {
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        border: none;
        color: white;
      }

      .btn-print:hover {
        background: linear-gradient(135deg, #218838 0%, #1ea97b 100%);
        color: white;
        transform: translateY(-2px);
      }

      .loading-container {
        text-align: center;
        padding: 4rem 2rem;
      }

      .loading-spinner {
        width: 3rem;
        height: 3rem;
        border: 0.3rem solid #f3f3f3;
        border-radius: 50%;
        border-top: 0.3rem solid #667eea;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .error-container {
        text-align: center;
        padding: 4rem 2rem;
      }

      .error-icon {
        font-size: 4rem;
        color: #dc3545;
        margin-bottom: 1rem;
      }

      @media print {
        body {
          background: white;
        }

        .bill-container {
          box-shadow: none;
          margin: 0;
          max-width: none;
        }

        .action-buttons {
          display: none;
        }

        .bill-header {
          background: #667eea !important;
          -webkit-print-color-adjust: exact;
          color-adjust: exact;
        }

        .table th {
          background: #667eea !important;
          -webkit-print-color-adjust: exact;
          color-adjust: exact;
        }

        .total-row {
          background: #667eea !important;
          -webkit-print-color-adjust: exact;
          color-adjust: exact;
        }
      }

      @media (max-width: 768px) {
        .bill-container {
          margin: 1rem;
          border-radius: 10px;
        }

        .bill-content {
          padding: 1rem;
        }

        .customer-info {
          padding: 1rem;
        }

        .info-row {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.25rem;
        }

        .action-buttons {
          flex-direction: column;
          align-items: center;
        }

        .btn-custom {
          width: 100%;
          max-width: 250px;
        }
      }
    </style>
  </head>

  <body x-data="billManager()">
    <div class="bill-container">
      <!-- Loading State -->
      <div x-show="loading" class="loading-container">
        <div class="loading-spinner"></div>
        <h4>Đang tải hóa đơn...</h4>
        <p class="text-muted">Vui lòng chờ trong giây lát</p>
      </div>

      <!-- Error State -->
      <div x-show="error && !loading" class="error-container">
        <i class="bi bi-exclamation-triangle error-icon"></i>
        <h4>Không thể tải hóa đơn</h4>
        <p class="text-muted" x-text="error"></p>
        <button class="btn btn-primary btn-custom" @click="loadBillData()">
          <i class="bi bi-arrow-clockwise"></i>
          Thử lại
        </button>
      </div>

      <!-- Bill Content -->
      <div x-show="!loading && !error && billData">
        <!-- Header -->
        <div class="bill-header">
          <h1>
            <i class="bi bi-receipt me-2"></i>
            HÓA ĐƠN THANH TOÁN
          </h1>
          <p class="mb-0 mt-2 opacity-75">
            #<span x-text="billData?.order?.orderID"></span>
          </p>
        </div>

        <!-- Content -->
        <div class="bill-content">
          <!-- Customer Information -->
          <div class="customer-info">
            <div class="row">
              <div class="col-md-6">
                <div class="info-row">
                  <span class="info-label">
                    <i class="bi bi-person"></i>
                    Khách hàng:
                  </span>
                  <span
                    class="info-value"
                    x-text="billData?.order?.fullName || 'N/A'"
                  ></span>
                </div>
                <div class="info-row">
                  <span class="info-label">
                    <i class="bi bi-telephone"></i>
                    SĐT:
                  </span>
                  <span
                    class="info-value"
                    x-text="billData?.order?.phone || 'N/A'"
                  ></span>
                </div>
                <div class="info-row">
                  <span class="info-label">
                    <i class="bi bi-table"></i>
                    Bàn:
                  </span>
                  <span
                    class="info-value"
                    x-text="billData?.order?.tableForView?.tableNumber || 'N/A'"
                  ></span>
                </div>
              </div>
              <div class="col-md-6">
                <div class="info-row">
                  <span class="info-label">
                    <i class="bi bi-person-badge"></i>
                    Nhân viên:
                  </span>
                  <span
                    class="info-value"
                    x-text="billData?.order?.createdBy?.fullName || 'N/A'"
                  ></span>
                </div>
                <div class="info-row">
                  <span class="info-label">
                    <i class="bi bi-clock"></i>
                    Thời gian:
                  </span>
                  <span
                    class="info-value"
                    x-text="formatDateTime(billData?.order?.createdAt)"
                  ></span>
                </div>
                <div class="info-row">
                  <span class="info-label">
                    <i class="bi bi-flag"></i>
                    Trạng thái:
                  </span>
                  <span
                    class="badge bg-success info-value"
                    x-text="billData?.order?.status || 'N/A'"
                  ></span>
                </div>
              </div>
            </div>
          </div>

          <!-- Items Table -->
          <div class="table-responsive items-table">
            <table class="table table-borderless mb-0">
              <thead>
                <tr>
                  <th>
                    <i class="bi bi-cup-hot me-2"></i>
                    Tên món
                  </th>
                  <th class="text-center">
                    <i class="bi bi-123 me-2"></i>
                    Số lượng
                  </th>
                  <th class="text-end">
                    <i class="bi bi-tag me-2"></i>
                    Đơn giá
                  </th>
                  <th class="text-end">
                    <i class="bi bi-calculator me-2"></i>
                    Thành tiền
                  </th>
                </tr>
              </thead>
              <tbody>
                <template
                  x-for="item in billData?.orderDetails || []"
                  :key="item.orderDetailID"
                >
                  <tr>
                    <td>
                      <div class="item-name">
                        <i class="bi bi-cup-hot text-primary"></i>
                        <span x-text="item.foodItem?.name || 'N/A'"></span>
                      </div>
                    </td>
                    <td class="text-center">
                      <span
                        class="quantity-badge"
                        x-text="item.quantity"
                      ></span>
                    </td>
                    <td
                      class="text-end price-cell"
                      x-text="formatCurrency(item.priceAtOrderTime)"
                    ></td>
                    <td
                      class="text-end price-cell"
                      x-text="formatCurrency(item.priceAtOrderTime * item.quantity)"
                    ></td>
                  </tr>
                </template>
              </tbody>
              <tfoot>
                <tr class="total-row">
                  <th colspan="3">
                    <i class="bi bi-calculator me-2"></i>
                    TỔNG TIỀN:
                  </th>
                  <th
                    class="text-end"
                    x-text="formatCurrency(billData?.total)"
                  ></th>
                </tr>
              </tfoot>
            </table>
          </div>

          <!-- Action Buttons -->
          <div class="action-buttons">
            <button class="btn btn-custom btn-print" @click="printBill()">
              <i class="bi bi-printer"></i>
              In hóa đơn
            </button>
            <a href="/employee/tables" class="btn btn-custom btn-back">
              <i class="bi bi-arrow-left"></i>
              Quay về
            </a>
          </div>
        </div>
      </div>
    </div>

    <script>
      function billManager() {
        return {
          billData: null,
          loading: true,
          error: null,

          async init() {
            await this.loadBillData();
          },

          async loadBillData() {
            try {
              this.loading = true;
              this.error = null;

              // Get order ID from URL
              const pathParts = window.location.pathname.split("/");
              const orderIdIndex =
                pathParts.findIndex((part) => part === "order") + 1;
              const orderId = pathParts[orderIdIndex];

              if (!orderId) {
                throw new Error("Không tìm thấy ID hóa đơn");
              }

              const response = await axios.get(
                `/employee/tables/api/order/${orderId}/bill`
              );

              if (response.data.success) {
                this.billData = response.data.data;
              } else {
                this.error = response.data.message || "Không thể tải hóa đơn";
              }
            } catch (error) {
              console.error("Error loading bill:", error);
              this.error = "Lỗi kết nối. Vui lòng thử lại sau.";
            } finally {
              this.loading = false;
            }
          },

          formatDateTime(dateTime) {
            if (!dateTime) return "N/A";
            try {
              const date = new Date(dateTime);
              return date.toLocaleString("vi-VN", {
                day: "2-digit",
                month: "2-digit",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit",
              });
            } catch (error) {
              return dateTime;
            }
          },

          formatCurrency(amount) {
            if (amount == null) return "0 đ";
            try {
              return new Intl.NumberFormat("vi-VN").format(amount) + " đ";
            } catch (error) {
              return amount + " đ";
            }
          },

          printBill() {
            window.print();
          },
        };
      }
    </script>
  </body>
</html>
