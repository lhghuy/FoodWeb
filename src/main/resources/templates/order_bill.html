<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Hóa đơn</title>
        <link rel="stylesheet" th:href="@{/css/order_bill.css}">
    </head>
<body>

<h2>HÓA ĐƠN THANH TOÁN</h2>

<p><strong>Khách hàng:</strong> <span th:text="${order.fullName}"></span></p>
<p><strong>SĐT:</strong> <span th:text="${order.phone}"></span></p>
<p><strong>Bàn:</strong> <span th:text="${order.table.tableNumber}"></span></p>
<p><strong>Nhân viên:</strong> <span th:text="${order.createdBy.fullName}"></span></p>
<p><strong>Thời gian:</strong> <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span></p>

<table>
    <thead>
    <tr>
        <th>Tên món</th>
        <th>Số lượng</th>
        <th>Đơn giá</th>
        <th>Thành tiền</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${orderDetails}">
        <td th:text="${item.food.name}"></td>
        <td th:text="${item.quantity}"></td>
        <td th:text="${#numbers.formatDecimal(item.priceAtOrderTime, 0, 'POINT', 0, 'COMMA')} + ' đ'"></td>
        <td th:text="${#numbers.formatDecimal(item.priceAtOrderTime * item.quantity, 0, 'POINT', 0, 'COMMA')} + ' đ'"></td>
    </tr>
    </tbody>
</table>

<div class="summary">
    <p><strong>Tổng tiền:</strong> <span th:text="${#numbers.formatDecimal(total, 0, 'POINT', 0, 'COMMA')} + ' đ'"></span></p>
</div>

<a th:href="@{/employee/tables}" class="btn-back">Quay về</a>

</body>
</html>
