<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<header>
    <div class="logo">
        <img src="/images/logo.jpg" alt="TeamFOOD">
    </div>
    <nav>
        <a th:href="@{/#}">Trang chủ</a>
    </nav>
</header>

<main>
    <h1>ĐĂNG NHẬP</h1>
    
    <form  method="post" th:action="@{/login}">
        <label for="username">Tài khoản</label>
        <input type="text" id="username" name="username" placeholder="Nhập tài khoản" required>
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
        <button type="submit">Đăng nhập</button>
    </form>
    <p th:if="${param.error}" style="color: red; margin-bottom: 10px;">
        Sai tên đăng nhập hoặc mật khẩu!
    </p>
</main>

<div th:replace="fragments/footer :: site-footer"></div>

</body>
</html>
