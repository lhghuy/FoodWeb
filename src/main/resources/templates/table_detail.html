<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết bàn</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="sidebar">
    <h2>NhanVien</h2>
    <ul>
        <li><a th:href="@{/employee}">Dashboard</a></li>
        <li class="active"><a th:href="@{/employee/tables}">Quản lý bàn</a></li>
    </ul>
</div>

<div class="main-content">
    <div class="header">
        <h1>Chi tiết bàn <span th:text="${table.tableNumber}"></span></h1>
        <div class="user-info">
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-logout">Đăng xuất</button>
            </form>
            <span th:text="${loggedInUser}">Employee</span>
        </div>
    </div>

    <div class="card detail-container">
        <h3>Thông tin bàn</h3>
        <p><strong>Số bàn:</strong> <span th:text="${table.tableNumber}"></span></p>
        <p><strong>Trạng thái:</strong> <span th:text="${table.status == 'Trong' ? 'Trống' : 'Đang phục vụ'}"></span></p>
        <p><strong>Nhân viên phụ trách:</strong> <span th:text="${table.employee != null ? table.employee.fullName : 'Chưa có'}"></span></p>

        <h3 class="mt-3">Các món đã gọi</h3>
        <button class="btn btn-success mb-3" onclick="openAddItemModal()">Thêm món</button>
        <table class="table" th:if="${not #lists.isEmpty(tableDetails)}">
            <thead>
            <tr>
                <th>Tên món</th>
                <th>Số lượng</th>
                <th>Đơn giá</th>
                <th>Tổng tiền món</th>
                <th>Tác vụ</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="detail : ${tableDetails}">
                <td th:text="${detail.foodItem.name}"></td>
                <td th:text="${detail.quantity}"></td>
                <td th:text="${#numbers.formatDecimal(detail.foodItem.price, 0, 'POINT', 3, 'COMMA')} + ' vnđ'"></td>
                <td th:text="${#numbers.formatDecimal(detail.totalPrice, 0, 'POINT', 3, 'COMMA')} + ' vnđ'"></td>
                <td class="actions">
                    <button class="btn btn-primary btn-sm mr-2" th:onclick="'openEditItemModal(' + ${detail.tableDetailId} + ')'">Sửa</button>
                    <button class="btn btn-danger btn-sm" th:onclick="'deleteItem(' + ${detail.tableDetailId} + ')'">Xóa</button>
                </td>
            </tr>
            </tbody>
            <tfoot>
            <tr>
                <td colspan="3" class="text-right font-weight-bold">Tổng tiền:</td>
                <td class="font-weight-bold">
                    <span th:text="${#numbers.formatDecimal(totalPrice, 0, 'POINT', 3, 'COMMA')}"></span>đ
                </td>
                <td></td>
            </tr>
            </tfoot>
        </table>
        <p class="alert alert-info" th:if="${#lists.isEmpty(tableDetails)}">Bàn này chưa có món nào.</p>
    </div>

    <div id="addItemModal" class="modal fade" tabindex="-1" role="dialog">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm món mới</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body" id="addItemModalContent">
                </div>
            </div>
        </div>
    </div>

    <div id="editItemModal" class="modal fade" tabindex="-1" role="dialog">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Sửa số lượng</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body" id="editItemModalContent">
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script th:inline="javascript">
    function openAddItemModal() {
        var modal = $('#addItemModal');
        var tableId = /*[[${table.tableID}]]*/ 0;
        fetch('/employee/tables/' + tableId + '/add-item-form')
            .then(response => response.text())
            .then(data => {
                $('#addItemModalContent').html(data);
                modal.modal('show');
                $('#addItemForm').on('submit', function(event) {
                    event.preventDefault();
                    var formData = new FormData(this);
                    fetch('/employee/tables/' + tableId + '/add', {
                        method: 'POST',
                        body: formData
                    })
                        .then(response => {
                            if (response.ok) {
                                modal.modal('hide');
                                window.location.reload();
                            } else {
                                alert('Vượt quá số lượng!');
                            }
                        });
                });
            });
    }

    function closeAddItemModal() {
        $('#addItemModal').modal('hide');
    }

    function openEditItemModal(detailId) {
        var modal = $('#editItemModal');
        fetch('/employee/tables/detail/' + detailId + '/edit-form')
            .then(response => response.text())
            .then(data => {
                $('#editItemModalContent').html(data);
                modal.modal('show');
                $('#editItemForm').on('submit', function(event) {
                    event.preventDefault();
                    var formData = new FormData(this);
                    fetch('/employee/tables/detail/' + detailId + '/update', {
                        method: 'POST',
                        body: formData
                    })
                        .then(response => {
                            if (response.ok) {
                                modal.modal('hide');
                                window.location.reload();
                            } else {
                                alert('Vượt quá số lượng!');
                            }
                        });
                });
            });
    }

    function closeEditItemModal() {
        $('#editItemModal').modal('hide');
    }

    function deleteItem(detailId) {
        if (confirm('Bạn có chắc chắn muốn xóa món này?')) {
            fetch('/employee/tables/detail/' + detailId + '/delete', {
                method: 'DELETE'
            })
                .then(response => {
                    if (response.ok) {
                        window.location.reload();
                    } else {
                        alert('Failed to delete item.');
                    }
                });
        }
    }
</script>
</body>
</html>
