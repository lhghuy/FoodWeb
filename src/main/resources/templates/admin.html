    <style>
      .stats-card {
        background: white;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        border: none;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .stats-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(
          90deg,
          var(--card-color, #007bff),
          var(--card-color-light, #66b3ff)
        );
      }

      .stats-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
      }

      .stats-card.primary {
        --card-color: #667eea;
        --card-color-light: #764ba2;
      }

      .stats-card.success {
        --card-color: #56ab2f;
        --card-color-light: #a8e6cf;
      }

      .stats-card.warning {
        --card-color: #f093fb;
        --card-color-light: #f5576c;
      }

      .stats-card.info {
        --card-color: #4facfe;
        --card-color-light: #00f2fe;
      }

      .stats-icon {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: white;
        margin-bottom: 1rem;
      }

      .stats-icon.primary {
        background: linear-gradient(135deg, #667eea, #764ba2);
      }

      .stats-icon.success {
        background: linear-gradient(135deg, #56ab2f, #a8e6cf);
      }

      .stats-icon.warning {
        background: linear-gradient(135deg, #f093fb, #f5576c);
      }

      .stats-icon.info {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
      }

      .stats-number {
        font-size: 2rem;
        font-weight: 700;
        color: #2c3e50;
        margin-bottom: 0.5rem;
      }

      .stats-label {
        color: #6c757d;
        font-size: 0.9rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .stats-change {
        font-size: 0.8rem;
        font-weight: 600;
        margin-top: 0.5rem;
      }

      .stats-change.positive {
        color: #28a745;
      }

      .stats-change.negative {
        color: #dc3545;
      }

      .card-modern {
        border: none;
        border-radius: 12px;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        transition: all 0.3s ease;
      }

      .table-modern {
        margin: 0;
      }

      .table-modern thead th {
        background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        border: none;
        padding: 1rem;
        font-weight: 600;
        color: #2c3e50;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-size: 0.8rem;
      }

      .table-modern tbody td {
        padding: 1rem;
        border: none;
        border-bottom: 1px solid #eee;
        vertical-align: middle;
      }

      .table-modern tbody tr:hover {
        background-color: rgba(52, 152, 219, 0.05);
      }

      .status-badge {
        padding: 0.5rem 1rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .status-completed {
        background-color: rgba(39, 174, 96, 0.1);
        color: #27ae60;
        border: 1px solid rgba(39, 174, 96, 0.2);
      }

      .status-pending {
        background-color: rgba(243, 156, 18, 0.1);
        color: #f39c12;
        border: 1px solid rgba(243, 156, 18, 0.2);
      }

      .status-processing {
        background-color: rgba(52, 152, 219, 0.1);
        color: #3498db;
        border: 1px solid rgba(52, 152, 219, 0.2);
      }

      .quick-actions {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .quick-action-btn {
        background: white;
        border: 2px solid #e9ecef;
        border-radius: 12px;
        padding: 1.5rem;
        text-decoration: none;
        color: #2c3e50;
        text-align: center;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }

      .quick-action-btn:hover {
        border-color: #667eea;
        color: #667eea;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(102, 126, 234, 0.2);
        text-decoration: none;
      }

      .quick-action-icon {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }

      .chart-container {
        position: relative;
        height: 300px;
        margin: 1rem 0;
      }

      .welcome-section {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border-radius: 12px;
        padding: 2rem;
        margin-bottom: 2rem;
        position: relative;
        overflow: hidden;
      }

      .welcome-section::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -20%;
        width: 200px;
        height: 200px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
      }

      .welcome-section::after {
        content: "";
        position: absolute;
        bottom: -30%;
        left: -10%;
        width: 150px;
        height: 150px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 50%;
      }

      .welcome-content {
        position: relative;
        z-index: 2;
      }

      @media (max-width: 768px) {
        .stats-number {
          font-size: 1.5rem;
        }

        .quick-actions {
          grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }

        .stats-card {
          padding: 1.5rem;
        }
      }
    </style>
  </head>

    <script>
      // Revenue Chart
      const revenueCtx = document
        .getElementById("revenueChart")
        .getContext("2d");
      new Chart(revenueCtx, {
        type: "line",
        data: {
          labels: ["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "CN"],
          datasets: [
            {
              label: "Doanh Thu (Triệu VND)",
              data: [32, 28, 35, 42, 38, 45, 48],
              borderColor: "rgb(102, 126, 234)",
              backgroundColor: "rgba(102, 126, 234, 0.1)",
              borderWidth: 3,
              fill: true,
              tension: 0.4,
              pointBackgroundColor: "rgb(102, 126, 234)",
              pointBorderColor: "white",
              pointBorderWidth: 2,
              pointRadius: 6,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false,
            },
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: {
                color: "rgba(0, 0, 0, 0.05)",
              },
            },
            x: {
              grid: {
                display: false,
              },
            },
          },
        },
      });

      // Popular Foods Chart
      const popularFoodsCtx = document
        .getElementById("popularFoodsChart")
        .getContext("2d");
      new Chart(popularFoodsCtx, {
        type: "doughnut",
        data: {
          labels: ["Phở Bò", "Bánh Mì", "Cơm Tấm", "Bún Chả", "Khác"],
          datasets: [
            {
              data: [30, 25, 20, 15, 10],
              backgroundColor: [
                "rgba(102, 126, 234, 0.8)",
                "rgba(86, 171, 47, 0.8)",
                "rgba(240, 147, 251, 0.8)",
                "rgba(79, 172, 254, 0.8)",
                "rgba(255, 159, 64, 0.8)",
              ],
              borderWidth: 0,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: "bottom",
              labels: {
                padding: 20,
                usePointStyle: true,
              },
            },
          },
        },
      });
